<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Categorias</title>
    <link rel="stylesheet" th:href="@{/css/lista-categorias.css}">
</head>
<body>
<h1>Categorias</h1>

<a href="/categorias/nova">Nova Categoria</a>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categorias}">
        <td th:text="${cat.idCategoria}"></td>
        <td th:text="${cat.nome}"></td>
        <td>
            <a th:href="@{/categorias/editar/{id}(id=${cat.idCategoria})}">Editar</a> |
            <a th:href="@{/categorias/excluir/{id}(id=${cat.idCategoria})}">Excluir</a>
        </td>
    </tr>
    </tbody>
</table>

<a href="/produtos">Voltar para Produtos</a>
</body>
</html>
