<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Produtos</title>
    <link rel="stylesheet" th:href="@{/css/lista-produtos.css}">
</head>
<body>
    <h1>Lista de Produtos</h1>
    <form method="get" action="/produtos">
        <input type="text" name="nome" placeholder="Buscar por nome" th:value="${nome}">
        <button type="submit">Buscar</button>
    </form>
    <table>
        <thead>
        <tr>
            <th>Id</th>
            <th>Nome</th>
            <th>Valor</th>
            <th>Data de Criação</th>
            <th>Categoria</th>
            <th sec:authorize="hasRole('ADMIN')">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${produtos}">
            <td th:text="${p.idProduto}"></td>
            <td th:text="${p.nome}"></td>
            <td th:text="'R$ ' + ${#numbers.formatDecimal(p.valor, 1, 'POINT', 2, 'COMMA')}" th:classappend="${p.valor > 1000} ? 'preco-alto' : ''"></td>
            <td th:text="${#temporals.format(p.dataCadastro, 'dd/MM/yyyy HH:mm:ss')}"></td>
            <td th:text="${p.categoria.nome}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/produtos/editar/{id}(id=${p.idProduto})}">Editar</a>
                <a th:href="@{/produtos/excluir/{id}(id=${p.idProduto})}">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="btnContainer">
        <div sec:authorize="hasRole('ADMIN')">
            <a href="/produtos/novo">Adicionar Produto</a>
        </div>
        <div>
            <a href="/login">Sair</a>
        </div>
    </div>
</body>
</html>
